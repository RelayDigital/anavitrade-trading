name = "anavitrade-trading"
main = "src/server/worker.ts"
compatibility_date = "2026-07-17"

[observability]
enabled = true
head_sampling_rate = 0.1

[[d1_databases]]
binding = "DB"
database_name = "anavitrade-db"
database_id = "2f30b46a-e457-4691-a309-a3c8e27bbac7"

# Local/dev vars. In production these are set as Worker secrets, not here.
[vars]
VITE_APP_ID = "anavitrade-trading"
APP_ENVIRONMENT = "production"
APP_BASE_URL = "https://anavitrade-trading.vercel.app"
CORS_ALLOWED_ORIGINS = "https://anavitrade-trading.vercel.app"
ASTER_BUILDER_ADDRESS = "0x58c022C844B1Ee047A78dcdDeb516eD992e80828"
ASTER_API_BASE_URL = "https://fapi.asterdex.com"
ASTER_DEFAULT_FEE_RATE = "0"
ASTER_ENVIRONMENT = "production"
ASTER_LIVE_ORDER_SUBMISSION_ENABLED = "false"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Scrapes coinlegs every 60 seconds → scores → auto-dispatches Tier A signals.
# Sliding 3-min window keeps latency under 1 min while catching clock-skew.
[triggers]
crons = ["* * * * *"]
